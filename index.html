<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记账本</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%232d7a4f'/%3E%3Cpath d='M16 22h32M16 32h32M16 42h20' stroke='white' stroke-width='5.5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:       #edf1ee;
      --panel:    #ffffff;
      --surf:     #f4f8f5;
      --surf2:    #e8f1eb;
      --border:   #d3e2d8;
      --border2:  #b8ccbe;
      --text:     #17231c;
      --sub:      #4e6157;
      --muted:    #88a094;
      --green:    #2a7248;
      --green2:   #36946090;
      --green3:   #1c5636;
      --red:      #c04848;
      --red2:     #9e3232;
      --amber:    #9e6c18;
      --blue:     #276090;
      --r:        13px;
      --rs:       8px;
      --sh:       0 2px 10px rgba(12,30,20,.07);
      --sh2:      0 6px 22px rgba(12,30,20,.11);
    }
    body {
      min-height: 100vh;
      background: var(--bg);
      background-image: radial-gradient(ellipse 65% 45% at 10% 0%, rgba(42,114,72,.08) 0%, transparent 55%);
      color: var(--text);
      font: 14px/1.6 -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", "Segoe UI", sans-serif;
      padding: 20px;
    }
    button, input, select { font: inherit; cursor: pointer; }

    /* ── App wrap ── */
    .app { width: min(1280px, 100%); margin: 0 auto; }

    /* ── Top bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; margin-bottom: 18px;
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); padding: 13px 18px; box-shadow: var(--sh);
    }
    .brand { display: flex; align-items: center; gap: 11px; }
    .brand-ico {
      width: 38px; height: 38px; border-radius: 10px; flex-shrink: 0;
      background: linear-gradient(140deg, #2a7248, #3aaa68);
      box-shadow: 0 3px 10px rgba(42,114,72,.3);
      display: flex; align-items: center; justify-content: center;
    }
    .brand-ico svg { width: 20px; height: 20px; }
    .brand h1 { font-size: 1.15rem; font-weight: 790; letter-spacing: -.02em; }
    .brand p { color: var(--sub); font-size: .76rem; margin-top: 1px; }

    .nav-row { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
    .month-nav {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--surf); border: 1px solid var(--border); border-radius: 999px; padding: 3px 7px;
    }
    .month-nav button {
      width: 28px; height: 28px; border: none; background: none; color: var(--sub);
      font-size: 1rem; border-radius: 50%; transition: background .13s, color .13s;
    }
    .month-nav button:hover { background: var(--surf2); color: var(--green3); }
    .month-label { min-width: 96px; text-align: center; font-weight: 720; font-size: .84rem; }

    .btn {
      display: inline-flex; align-items: center; gap: 4px;
      border: 1px solid var(--border); background: var(--panel); color: var(--sub);
      border-radius: var(--rs); padding: 6px 11px; font-weight: 660; font-size: .79rem;
      text-decoration: none; white-space: nowrap;
      transition: background .12s, border-color .12s, color .12s;
    }
    .btn:hover { background: var(--surf2); border-color: var(--border2); color: var(--text); }
    .btn.primary {
      background: linear-gradient(135deg, #2a7248, #3aaa68);
      border-color: #2a7248; color: #fff;
      box-shadow: 0 2px 8px rgba(42,114,72,.28);
    }
    .btn.primary:hover { background: linear-gradient(135deg, #1c5636, #2a7248); box-shadow: 0 3px 12px rgba(42,114,72,.36); }
    .btn.ghost-red { color: var(--red2); border-color: #dbb0b0; background: transparent; font-size: .75rem; padding: 5px 9px; }
    .btn.ghost-red:hover { background: #fff2f2; }

    /* ── Storage badge ── */
    .sbadge {
      display: inline-flex; align-items: center; gap: 5px;
      font-size: .69rem; font-weight: 660; padding: 3px 9px; border-radius: 999px;
    }
    .sbadge.srv { background: rgba(42,114,72,.1); color: var(--green3); border: 1px solid rgba(42,114,72,.22); }
    .sbadge.loc { background: rgba(158,108,24,.1); color: var(--amber); border: 1px solid rgba(158,108,24,.22); }
    .sdot { width: 5px; height: 5px; border-radius: 50%; background: currentColor; }

    /* ── KPI row ── */
    .kpi-row {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 16px;
    }
    .kpi {
      background: var(--panel); border: 1px solid var(--border); border-radius: var(--r);
      padding: 15px 16px 12px; box-shadow: var(--sh); position: relative; overflow: hidden;
      transition: transform .18s, box-shadow .18s;
    }
    .kpi:hover { transform: translateY(-2px); box-shadow: var(--sh2); }
    .kpi::before {
      content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; border-radius: var(--r) var(--r) 0 0;
    }
    .kpi:nth-child(1)::before { background: linear-gradient(90deg, #2a7248, #5ec47c); }
    .kpi:nth-child(2)::before { background: linear-gradient(90deg, #276090, #5898d8); }
    .kpi:nth-child(3)::before { background: linear-gradient(90deg, #9e6c18, #d8a83c); }
    .kpi-label { color: var(--sub); font-size: .72rem; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 5px; }
    .kpi-val { font-size: clamp(1.1rem,1.8vw,1.55rem); font-weight: 830; letter-spacing: -.02em; line-height: 1.1; }
    .kpi-sub { color: var(--muted); font-size: .72rem; margin-top: 5px; }
    .kpi-budget-bar { height: 4px; border-radius: 999px; background: var(--border); margin-top: 8px; overflow: hidden; }
    .kpi-budget-bar i { display: block; height: 100%; border-radius: 999px; background: var(--amber); transition: width .4s; }
    .pos { color: var(--green); } .neg { color: var(--red2); } .neu { color: var(--text); }
    .blu { color: var(--blue); } .amb { color: var(--amber); }

    /* ── Main 2-col layout ── */
    .main-layout {
      display: grid;
      grid-template-columns: 340px 1fr;
      gap: 14px;
      align-items: start;
    }

    /* ── Sidebar ── */
    .sidebar { display: flex; flex-direction: column; gap: 14px; }

    /* ── Panel ── */
    .panel {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: var(--r); box-shadow: var(--sh); padding: 18px; min-width: 0;
      transition: box-shadow .18s;
    }
    .panel:hover { box-shadow: var(--sh2); }
    .ph { display: flex; align-items: center; justify-content: space-between; gap: 8px; margin-bottom: 14px; }
    .ph h2 { font-size: .9rem; font-weight: 760; }
    .ph small {
      color: var(--muted); font-size: .69rem;
      background: var(--surf); border: 1px solid var(--border); border-radius: 999px; padding: 2px 7px;
    }

    /* ── Entry form ── */
    .type-sw { display: grid; grid-template-columns: 1fr 1fr; gap: 7px; margin-bottom: 12px; }
    .type-sw button {
      border: 1.5px solid var(--border); background: var(--surf); color: var(--sub);
      border-radius: var(--rs); padding: 8px; font-weight: 720; font-size: .84rem;
      transition: all .14s;
    }
    .type-sw button.active[data-type="expense"] { background: #fff1f1; border-color: #e2aaaa; color: var(--red2); box-shadow: 0 1px 6px rgba(192,72,72,.12); }
    .type-sw button.active[data-type="income"]  { background: #edf7f1; border-color: #90c8a8; color: var(--green3); box-shadow: 0 1px 6px rgba(42,114,72,.12); }

    .fg { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; }
    .fg .full { grid-column: 1/-1; }
    .field label { display: block; color: var(--sub); font-size: .69rem; font-weight: 650; letter-spacing: .03em; text-transform: uppercase; margin-bottom: 4px; }
    input, select {
      width: 100%; border: 1.5px solid var(--border); border-radius: var(--rs);
      background: var(--surf); color: var(--text); outline: none; padding: 8px 10px;
      transition: border-color .14s, box-shadow .14s, background .14s;
    }
    input:focus, select:focus { border-color: var(--green); background: #fff; box-shadow: 0 0 0 3px rgba(42,114,72,.1); }
    .form-actions { display: flex; gap: 7px; margin-top: 12px; }
    .hint-sm { color: var(--muted); font-size: .69rem; margin-top: 8px; }

    /* ── Budget inline ── */
    .budget-strip {
      display: flex; align-items: center; gap: 8px;
      padding: 10px 12px; background: var(--surf);
      border: 1px solid var(--border); border-radius: var(--rs);
    }
    .budget-strip label { color: var(--sub); font-size: .72rem; font-weight: 650; white-space: nowrap; }
    .budget-strip input { flex: 1; padding: 6px 8px; font-size: .82rem; }
    .budget-strip .btn { flex-shrink: 0; padding: 6px 10px; font-size: .76rem; }

    /* ── Expense chart ── */
    .chart-wrap { position: relative; min-height: 200px; }
    canvas { width: 100% !important; max-height: 220px; }
    .chart-empty {
      display: none; flex-direction: column; align-items: center; justify-content: center;
      gap: 8px; min-height: 200px; color: var(--muted); text-align: center; font-size: .8rem;
      border: 1.5px dashed var(--border); border-radius: var(--rs); background: var(--surf);
    }
    .chart-empty-ico { font-size: 1.8rem; opacity: .3; }

    /* ── Right main area ── */
    .main-area { display: flex; flex-direction: column; gap: 14px; }

    /* ── Records ── */
    .filters { display: grid; grid-template-columns: 130px 1fr; gap: 9px; margin-bottom: 12px; }
    .record-list { max-height: 380px; overflow-y: auto; padding-right: 1px; }
    .rec-item {
      display: grid; grid-template-columns: auto minmax(0,1fr) auto;
      gap: 10px; align-items: center;
      border-bottom: 1px solid var(--border);
      padding: 10px 4px;
      transition: background .12s;
    }
    .rec-item:last-child { border-bottom: none; }
    .rec-item:hover { background: var(--surf); border-radius: var(--rs); }
    .rec-dot { width: 8px; height: 8px; border-radius: 50%; flex-shrink: 0; }
    .rec-main { min-width: 0; }
    .rec-top { display: flex; align-items: center; gap: 6px; font-weight: 700; font-size: .85rem; }
    .rec-top span:last-child { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--sub); font-weight: 400; font-size: .78rem; }
    .rec-meta { color: var(--muted); font-size: .7rem; margin-top: 1px; }
    .cat-tag {
      display: inline-flex; align-items: center;
      background: var(--surf2); border: 1px solid var(--border);
      border-radius: 999px; padding: 1px 7px;
      font-size: .69rem; font-weight: 650; color: var(--sub); white-space: nowrap;
    }
    .rec-right { display: flex; flex-direction: column; align-items: flex-end; gap: 3px; }
    .rec-amt { font-weight: 810; font-size: .88rem; white-space: nowrap; }
    .rec-actions { display: flex; gap: 2px; }
    .txt-btn {
      border: none; background: transparent; color: var(--muted);
      font-size: .7rem; font-weight: 680; padding: 3px 5px; border-radius: 5px;
      transition: all .12s; cursor: pointer;
    }
    .txt-btn:hover { color: var(--green3); background: var(--surf2); }
    .txt-btn.d:hover { color: var(--red2); background: #fff1f1; }
    .empty-state {
      color: var(--muted); text-align: center; padding: 28px 16px; font-size: .82rem;
      border: 1.5px dashed var(--border); border-radius: var(--rs); background: var(--surf);
    }

    /* ── Trend chart row ── */
    .chart-row { display: grid; grid-template-columns: 5fr 7fr; gap: 14px; }
    .trend-wrap { min-height: 180px; }
    .trend-wrap canvas { max-height: 180px; }
    .chart-empty.trend-empty { min-height: 180px; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; } ::-webkit-scrollbar-thumb { background: #bfd0c4; border-radius: 999px; }

    .hidden-file { display: none; }

    /* ── Responsive ── */
    @media (max-width: 900px) {
      .main-layout { grid-template-columns: 1fr; }
      .kpi-row { grid-template-columns: repeat(3,1fr); }
      .chart-row { grid-template-columns: 1fr; }
    }
    @media (max-width: 580px) {
      body { padding: 12px; }
      .topbar { flex-direction: column; align-items: stretch; }
      .nav-row { flex-wrap: wrap; }
      .kpi-row { grid-template-columns: 1fr 1fr; }
      .fg, .filters { grid-template-columns: 1fr; }
      .month-nav { width: 100%; justify-content: space-between; }
      .month-label { flex: 1; }
    }
  </style>
</head>
<body>
<main class="app">

  <!-- Top bar -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h10"/>
        </svg>
      </div>
      <div>
        <h1>记账本</h1>
        <p>快速收支记录 · 本地数据持久化</p>
      </div>
    </div>
    <div class="nav-row">
      <span id="storageBadge" class="sbadge loc"><span class="sdot"></span>localStorage</span>
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
      <button class="btn" id="exportBtn">↓ 导出</button>
      <button class="btn" id="importBtn">↑ 导入</button>
      <input class="hidden-file" id="importFile" type="file" accept=".json,application/json" />
    </div>
  </header>

  <!-- KPI -->
  <section class="kpi-row">
    <article class="kpi">
      <div class="kpi-label">本月盈余</div>
      <div class="kpi-val neu" id="kpiSurplus">¥0.00</div>
      <div class="kpi-sub" id="kpiIO">收入 ¥0 · 支出 ¥0</div>
    </article>
    <article class="kpi">
      <div class="kpi-label">储蓄率</div>
      <div class="kpi-val blu" id="kpiRate">0%</div>
      <div class="kpi-sub" id="kpiRateSub">建议保持在 20% 以上</div>
    </article>
    <article class="kpi">
      <div class="kpi-label">预算余额</div>
      <div class="kpi-val amb" id="kpiBudget">未设置</div>
      <div class="kpi-sub" id="kpiBudgetSub">在下方设置月预算</div>
      <div class="kpi-budget-bar" id="budgetBarWrap" style="display:none"><i id="budgetBar" style="width:0%"></i></div>
    </article>
  </section>

  <!-- Main layout -->
  <div class="main-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar">

      <!-- Entry form -->
      <div class="panel">
        <div class="ph">
          <h2 id="formTitle">快速记账</h2>
          <small id="formState">新增</small>
        </div>
        <div class="type-sw">
          <button type="button" class="active" data-type="expense">支出</button>
          <button type="button" data-type="income">收入</button>
        </div>
        <form id="entryForm">
          <div class="fg">
            <div class="field">
              <label for="eDate">日期</label>
              <input id="eDate" type="date" required />
            </div>
            <div class="field">
              <label for="eCat">类别</label>
              <select id="eCat" required></select>
            </div>
            <div class="field full">
              <label for="eAmt">金额</label>
              <input id="eAmt" type="number" min="0.01" step="0.01" placeholder="0.00" required />
            </div>
            <div class="field full">
              <label for="eNote">备注（选填）</label>
              <input id="eNote" type="text" maxlength="60" placeholder="例如：午餐、房租、工资" />
            </div>
          </div>
          <div class="form-actions">
            <button class="btn primary" id="eSubmit" type="submit">添加记录</button>
            <button class="btn" id="eCancel" type="button" style="display:none">取消</button>
          </div>
          <p class="hint-sm" id="storageHint">💾 数据保存在浏览器本地</p>
        </form>
      </div>

      <!-- Budget strip -->
      <div class="budget-strip">
        <label for="budgetInput">月预算</label>
        <input id="budgetInput" type="number" min="0" step="1" placeholder="例如 5000" />
        <button class="btn primary" id="saveBudget">设置</button>
        <button class="btn ghost-red" id="clearBudget" title="清空本月预算">✕</button>
      </div>

      <!-- Expense chart -->
      <div class="panel" style="padding-bottom:14px">
        <div class="ph">
          <h2>支出构成</h2>
          <small id="expMeta">本月</small>
        </div>
        <div class="chart-wrap">
          <canvas id="expChart"></canvas>
          <div class="chart-empty" id="expEmpty"><div class="chart-empty-ico">🥧</div><div>本月暂无支出</div></div>
        </div>
      </div>

    </aside>

    <!-- ── Right main area ── -->
    <div class="main-area">

      <!-- Records -->
      <div class="panel">
        <div class="ph">
          <h2>流水明细</h2>
          <small id="recCount">0 条</small>
        </div>
        <div class="filters">
          <select id="typeFilter">
            <option value="all">全部</option>
            <option value="expense">支出</option>
            <option value="income">收入</option>
          </select>
          <input id="searchBox" type="search" placeholder="搜索类别 / 备注 / 日期" />
        </div>
        <div class="record-list" id="records"></div>
      </div>

      <!-- Charts row -->
      <div class="chart-row">
        <!-- Savings trend -->
        <div class="panel">
          <div class="ph">
            <h2>12 月储蓄趋势</h2>
            <small>累计盈余</small>
          </div>
          <div class="trend-wrap">
            <canvas id="trendChart"></canvas>
            <div class="chart-empty trend-empty" id="trendEmpty"><div class="chart-empty-ico">📈</div><div>记录数月后显示</div></div>
          </div>
        </div>

        <!-- Monthly stats breakdown -->
        <div class="panel">
          <div class="ph">
            <h2>本月数据</h2>
            <small id="statsDate"></small>
          </div>
          <div id="statsContent"></div>
        </div>
      </div>

    </div>
  </div>

</main>

<script>
/* ── Constants ── */
const SK = 'ftApp_v1', LEGACY = ['financeApp_v5','financeApp_v4'];
const INC  = ['工资','兼职','投资收益','其他收入'];
const EXP  = ['餐饮','购物','交通','娱乐','住房','医疗','教育','其他'];
const ECOL = ['#c04848','#d87040','#cc8c28','#70a038','#2a8050','#2760907','#5448987','#a04080','#88a094'];
const PURE_ECOL = ['#c04848','#d87040','#cc8c28','#70a038','#2a8050','#276090','#544898','#a04080','#88a094'];

/* ── Local server ── */
const IS_LOCAL = location.hostname==='localhost'||location.hostname==='127.0.0.1';
const API = IS_LOCAL ? `http://${location.hostname}:3457/api/finance` : null;
let srvOK = false, saveTimer = null;
async function ping(){ try{return(await fetch(API+'/ping',{signal:AbortSignal.timeout(800)})).ok}catch{return false} }
async function loadSrv(){ const r=await fetch(API+'/data'); if(!r.ok) throw 0; return r.json(); }
async function pushSrv(d){ await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)}); }

/* ── State ── */
const now = new Date();
let CY=now.getFullYear(), CM=now.getMonth()+1;
let st, etype='expense', editing=null, echart=null, tchart=null;

function emptyState(){ return {incCats:[...INC],expCats:[...EXP],months:{},budgets:{}}; }

function norm(input){
  const b=emptyState(), n={
    incCats: Array.isArray(input.incCats)&&input.incCats.length?input.incCats:b.incCats,
    expCats: Array.isArray(input.expCats)&&input.expCats.length?input.expCats:b.expCats,
    months:{}, budgets:{}
  };
  Object.entries(input.months||{}).forEach(([k,m])=>{
    n.months[k]={
      income:(m.income||[]).map(x=>normEntry(x,'income',k)).filter(Boolean),
      expense:(m.expense||[]).map(x=>normEntry(x,'expense',k)).filter(Boolean),
    };
  });
  Object.keys(input.budgets||{}).forEach(k=>{
    const bk=input.budgets[k]||{};
    const v=+bk.monthly||+(typeof bk==='number'?bk:0);
    n.budgets[k]={monthly:v>0?v:0};
  });
  return n;
}
function normEntry(x,type,mk){
  const a=+x.amount; if(!isFinite(a)||a<=0)return null;
  return{id:sid(x.id),cat:String(x.cat||(type==='income'?INC[0]:EXP[0])),amount:a,
    note:String(x.note||'').slice(0,60),date:/^\d{4}-\d{2}-\d{2}$/.test(x.date+'')?x.date:mk+'-01'};
}
function loadLS(){
  const raw=localStorage.getItem(SK)||LEGACY.map(k=>localStorage.getItem(k)).find(Boolean);
  if(!raw)return emptyState();
  try{const p=JSON.parse(raw);return norm(p.data||p);}catch{return emptyState();}
}
function save(){
  localStorage.setItem(SK,JSON.stringify(st));
  if(srvOK){clearTimeout(saveTimer);saveTimer=setTimeout(()=>pushSrv(st).catch(()=>{}),400);}
}

/* ── Helpers ── */
const $=id=>document.getElementById(id);
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function sid(v){const s=String(v||'');return /^[a-z0-9]+$/i.test(s)?s:uid();}
function mk(y=CY,m=CM){return `${y}-${String(m).padStart(2,'0')}`;}
function today(){return `${now.getFullYear()}-${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')}`;}
function cMonth(){const k=mk();if(!st.months[k])st.months[k]={income:[],expense:[]};return st.months[k];}
function cBudget(){const k=mk();if(!st.budgets[k])st.budgets[k]={monthly:0};return st.budgets[k];}
function fmt(v,c=false){return(+v||0).toLocaleString('zh-CN',{style:'currency',currency:'CNY',minimumFractionDigits:c?0:2,maximumFractionDigits:c?0:2});}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sum(a){return a.reduce((t,x)=>t+(+x.amount||0),0);}
function byCat(a){return a.reduce((m,x)=>{m[x.cat]=(m[x.cat]||0)+(+x.amount||0);return m;},{});}

/* ── Badge & hints ── */
function updateBadge(){
  const b=$('storageBadge'),h=$('storageHint');
  if(srvOK){b.className='sbadge srv';b.innerHTML='<span class="sdot"></span>本地服务器';h.textContent='✅ 数据已写入本地文件，重启浏览器不丢失';}
  else{b.className='sbadge loc';b.innerHTML='<span class="sdot"></span>localStorage';h.textContent='💾 数据保存在浏览器本地，建议定期导出备份';}
}

/* ── Render KPIs ── */
function renderKPI(){
  const d=cMonth(),inc=sum(d.income),exp=sum(d.expense),sur=inc-exp,sr=inc>0?(sur/inc)*100:0;
  const bud=cBudget();
  $('kpiSurplus').textContent=fmt(sur);
  $('kpiSurplus').className='kpi-val '+(sur>0?'pos':sur<0?'neg':'neu');
  $('kpiIO').textContent=`收入 ${fmt(inc,true)} · 支出 ${fmt(exp,true)}`;
  $('kpiRate').textContent=inc>0?`${sr.toFixed(1)}%`:'—';
  $('kpiRate').className='kpi-val '+(sr>=20?'pos':sr>0?'blu':'neu');
  $('kpiRateSub').textContent=inc>0?(sr>=20?'✓ 健康区间':'建议压缩弹性消费'):'录入收入后显示';
  if(bud.monthly>0){
    const rem=bud.monthly-exp,pct=Math.min(100,exp/bud.monthly*100);
    $('kpiBudget').textContent=fmt(rem);
    $('kpiBudget').className='kpi-val '+(rem>=0?'pos':'neg');
    $('kpiBudgetSub').textContent=`已用 ${pct.toFixed(0)}% · 共 ${fmt(bud.monthly,true)}`;
    $('budgetBarWrap').style.display='block';
    $('budgetBar').style.width=pct+'%';
    $('budgetBar').style.background=pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--green)';
  }else{
    $('kpiBudget').textContent='未设置';$('kpiBudget').className='kpi-val amb';
    $('kpiBudgetSub').textContent='在侧栏输入月预算金额';$('budgetBarWrap').style.display='none';
  }
  $('budgetInput').value=bud.monthly||'';
}

/* ── Render records ── */
function renderRecords(){
  const d=cMonth(),fl=$('typeFilter').value,kw=$('searchBox').value.trim().toLowerCase();
  let rows=[...d.expense.map(x=>({...x,type:'expense'})),...d.income.map(x=>({...x,type:'income'}))];
  if(fl!=='all')rows=rows.filter(x=>x.type===fl);
  if(kw)rows=rows.filter(x=>[x.date,x.cat,x.note,String(x.amount)].join(' ').toLowerCase().includes(kw));
  rows.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  $('recCount').textContent=rows.length+' 条';
  if(!rows.length){$('records').innerHTML='<div class="empty-state">没有匹配的记录</div>';return;}
  $('records').innerHTML=rows.map(x=>{
    const ie=x.type==='expense',col=ie?'#c04848':'#2a7248',amt=(ie?'-':'+')+fmt(x.amount);
    return`<div class="rec-item">
      <span class="rec-dot" style="background:${col}"></span>
      <div class="rec-main">
        <div class="rec-top"><span class="cat-tag">${esc(x.cat)}</span>${x.note?`<span>${esc(x.note)}</span>`:''}</div>
        <div class="rec-meta">${esc(x.date)} · ${ie?'支出':'收入'}</div>
      </div>
      <div class="rec-right">
        <span class="rec-amt ${ie?'neg':'pos'}">${amt}</span>
        <div class="rec-actions">
          <button class="txt-btn" onclick="startEdit('${x.type}','${x.id}')">编辑</button>
          <button class="txt-btn d" onclick="delEntry('${x.type}','${x.id}')">删除</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

/* ── Render stats panel ── */
function renderStats(){
  const d=cMonth(),inc=sum(d.income),exp=sum(d.expense),sur=inc-exp;
  const cs=Object.entries(byCat(d.expense)).sort((a,b)=>b[1]-a[1]);
  $('statsDate').textContent=`${CY}年${CM}月`;
  const total=d.income.length+d.expense.length;
  if(!total){$('statsContent').innerHTML='<div class="empty-state" style="min-height:140px">记录几笔后这里会显示分类汇总</div>';return;}
  let html=`<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;margin-bottom:12px">
    <div style="text-align:center;padding:10px 6px;background:var(--surf);border-radius:var(--rs)">
      <div style="font-size:.7rem;color:var(--sub);margin-bottom:3px">总收入</div>
      <div style="font-weight:800;font-size:.94rem;color:var(--green)">${fmt(inc,true)}</div>
    </div>
    <div style="text-align:center;padding:10px 6px;background:var(--surf);border-radius:var(--rs)">
      <div style="font-size:.7rem;color:var(--sub);margin-bottom:3px">总支出</div>
      <div style="font-weight:800;font-size:.94rem;color:var(--red)">${fmt(exp,true)}</div>
    </div>
    <div style="text-align:center;padding:10px 6px;background:var(--surf);border-radius:var(--rs)">
      <div style="font-size:.7rem;color:var(--sub);margin-bottom:3px">共记录</div>
      <div style="font-weight:800;font-size:.94rem;color:var(--text)">${total} 笔</div>
    </div>
  </div>`;
  if(cs.length){
    html+=`<div style="font-size:.72rem;color:var(--sub);font-weight:650;text-transform:uppercase;letter-spacing:.03em;margin-bottom:7px">支出分类</div>`;
    html+=cs.slice(0,5).map(([cat,amt])=>{
      const pct=exp>0?amt/exp*100:0;
      return`<div style="margin-bottom:7px">
        <div style="display:flex;justify-content:space-between;font-size:.8rem;margin-bottom:3px">
          <span style="font-weight:680">${esc(cat)}</span>
          <span style="color:var(--sub)">${fmt(amt,true)} · ${pct.toFixed(0)}%</span>
        </div>
        <div style="height:4px;border-radius:999px;background:var(--border);overflow:hidden">
          <i style="display:block;height:100%;width:${pct}%;border-radius:999px;background:var(--red);opacity:.7"></i>
        </div>
      </div>`;
    }).join('');
  }
  $('statsContent').innerHTML=html;
}

/* ── Charts ── */
function drawExpense(){
  const d=cMonth(),g=Object.entries(byCat(d.expense)).sort((a,b)=>b[1]-a[1]);
  const cv=$('expChart'),em=$('expEmpty');
  if(echart){echart.destroy();echart=null;}
  if(!g.length||typeof Chart==='undefined'){cv.style.display='none';em.style.display='flex';return;}
  cv.style.display='block';em.style.display='none';
  echart=new Chart(cv.getContext('2d'),{type:'doughnut',data:{
    labels:g.map(([c])=>c),
    datasets:[{data:g.map(([,a])=>a),backgroundColor:g.map((_,i)=>PURE_ECOL[i%PURE_ECOL.length]),borderColor:'#fff',borderWidth:2.5,hoverOffset:6}]
  },options:{cutout:'66%',plugins:{
    legend:{position:'bottom',labels:{boxWidth:8,boxHeight:8,color:'#4e6157',font:{size:10.5},padding:10}},
    tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.parsed)}`}},
  },animation:{duration:350,easing:'easeOutCubic'}}});
}

function drawTrend(){
  const months=[],labels=[];
  for(let i=11;i>=0;i--){
    let y=CY,m=CM-i;
    while(m<1){m+=12;y--;} while(m>12){m-=12;y++;}
    months.push(mk(y,m));labels.push(`${String(m).padStart(2,'0')}月`);
  }
  let run=0;
  Object.keys(st.months).sort().forEach(k=>{if(k<months[0]){const m=st.months[k];run+=sum(m.income||[])-sum(m.expense||[]);}});
  const vals=months.map(k=>{const m=st.months[k];if(m)run+=sum(m.income||[])-sum(m.expense||[]);return+run.toFixed(2);});
  const hasData=vals.some(v=>v!==0);
  const cv=$('trendChart'),em=$('trendEmpty');
  if(tchart){tchart.destroy();tchart=null;}
  if(!hasData||typeof Chart==='undefined'){cv.style.display='none';em.style.display='flex';return;}
  cv.style.display='block';em.style.display='none';
  const ctx=cv.getContext('2d'),g=ctx.createLinearGradient(0,0,0,170);
  g.addColorStop(0,'rgba(42,114,72,.18)');g.addColorStop(1,'rgba(42,114,72,.01)');
  tchart=new Chart(cv,{type:'line',data:{labels,datasets:[{
    data:vals,borderColor:'#2a7248',backgroundColor:g,borderWidth:2,
    pointRadius:3,pointHoverRadius:5,pointBackgroundColor:'#2a7248',pointBorderColor:'#fff',pointBorderWidth:1.5,
    tension:.38,fill:true,
  }]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:ctx=>` ${fmt(ctx.parsed.y)}`}}},
    scales:{
      x:{ticks:{color:'#88a094',font:{size:10}},grid:{color:'#ddeae0'}},
      y:{ticks:{color:'#88a094',font:{size:10},callback:v=>fmt(v,true)},grid:{color:'#ddeae0'}},
    },animation:{duration:350,easing:'easeOutCubic'}}});
}

/* ── Form helpers ── */
function renderCats(){
  const cats=etype==='income'?st.incCats:st.expCats;
  $('eCat').innerHTML=cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
function setType(t){
  etype=t;
  document.querySelectorAll('.type-sw button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));
  renderCats();
}
function setDate(){
  const last=new Date(CY,CM,0).getDate(),b=mk();
  $('eDate').min=b+'-01';$('eDate').max=b+'-'+String(last).padStart(2,'0');
  if(!editing){const t=today();$('eDate').value=t.startsWith(b)?t:b+'-01';}
}

/* ── Actions ── */
function startEdit(type,id){
  const item=cMonth()[type].find(x=>x.id===id);if(!item)return;
  editing={type,id};setType(type);
  $('eDate').value=item.date;$('eCat').value=item.cat;$('eAmt').value=item.amount;$('eNote').value=item.note||'';
  $('eSubmit').textContent='保存修改';$('eCancel').style.display='inline-flex';
  $('formState').textContent='编辑中';$('formTitle').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetForm(){
  editing=null;$('entryForm').reset();setDate();setType(etype);
  $('eSubmit').textContent='添加记录';$('eCancel').style.display='none';$('formState').textContent='新增';
}
function delEntry(type,id){
  if(!confirm('确认删除这条流水吗？'))return;
  const d=cMonth();d[type]=d[type].filter(x=>x.id!==id);
  save();if(editing&&editing.id===id)resetForm();renderAll();
}
function saveEntry(e){
  e.preventDefault();
  const date=$('eDate').value,cat=$('eCat').value,amt=+$('eAmt').value,note=$('eNote').value.trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date)||!cat||!isFinite(amt)||amt<=0){alert('请填写有效的日期、类别和金额');return;}
  const k=date.slice(0,7),[y,m]=k.split('-').map(Number);
  if(!st.months[k])st.months[k]={income:[],expense:[]};
  if(editing){
    const ol=cMonth()[editing.type],oi=ol.findIndex(x=>x.id===editing.id);
    if(oi>=0)ol.splice(oi,1);
    st.months[k][etype].push({id:editing.id,cat,amount:amt,note,date});
  }else st.months[k][etype].push({id:uid(),cat,amount:amt,note,date});
  CY=y;CM=m;save();resetForm();renderAll();
}
function exportData(){
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),data:st},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`finance-${mk()}-backup.json`});
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{
      const p=JSON.parse(r.result);
      if(!confirm('导入会覆盖当前所有数据，确认吗？'))return;
      st=norm(p.data||p);save();resetForm();renderAll();alert('导入完成');
    }catch{alert('文件格式不正确');}
    finally{$('importFile').value='';}
  };r.readAsText(file);
}
function changeMonth(d){CM+=d;while(CM<1){CM+=12;CY--;}while(CM>12){CM-=12;CY++;}resetForm();renderAll();}

function renderAll(){
  $('monthLabel').textContent=`${CY}年${CM}月`;
  setDate();renderCats();renderKPI();renderRecords();renderStats();drawExpense();drawTrend();
}

/* ── Wire events ── */
document.querySelectorAll('.type-sw button').forEach(b=>b.addEventListener('click',()=>setType(b.dataset.type)));
$('entryForm').addEventListener('submit',saveEntry);
$('eCancel').addEventListener('click',resetForm);
$('prevMonth').addEventListener('click',()=>changeMonth(-1));
$('nextMonth').addEventListener('click',()=>changeMonth(1));
$('exportBtn').addEventListener('click',exportData);
$('importBtn').addEventListener('click',()=>$('importFile').click());
$('importFile').addEventListener('change',e=>importData(e.target.files[0]));
$('saveBudget').addEventListener('click',()=>{
  const v=+$('budgetInput').value;cBudget().monthly=v>0?v:0;save();renderAll();
});
$('clearBudget').addEventListener('click',()=>{
  if(!confirm('清空本月预算？'))return;st.budgets[mk()]={monthly:0};save();renderAll();
});
$('typeFilter').addEventListener('change',renderRecords);
$('searchBox').addEventListener('input',renderRecords);

/* ── Boot ── */
(async()=>{
  if(IS_LOCAL){
    srvOK=await ping();
    if(srvOK){
      try{const d=await loadSrv();if(d&&(d.months||d.incCats)){st=norm(d);localStorage.setItem(SK,JSON.stringify(st));}
      else{st=loadLS();await pushSrv(st);}}
      catch{st=loadLS();}
    }else st=loadLS();
  }else st=loadLS();
  updateBadge();setType('expense');renderAll();
})();
</script>
</body>
</html>

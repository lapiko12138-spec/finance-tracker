<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>记账本</title>
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' rx='16' fill='%232a7248'/%3E%3Cpath d='M16 22h32M16 32h32M16 42h20' stroke='white' stroke-width='5.5' stroke-linecap='round'/%3E%3C/svg%3E" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{
      --bg:#edf1ee;
      --panel:#fff;
      --surf:#f3f8f4;
      --surf2:#e6f0e9;
      --border:#d2e2d7;
      --border2:#b6cab d;
      --text:#16221c;
      --sub:#4c5f56;
      --muted:#86998f;
      --green:#267045;
      --green2:#30906080;
      --green3:#1a5233;
      --red:#be4444;
      --red2:#9c3030;
      --amber:#9c6814;
      --blue:#255e8c;
      --violet:#52489a;
      --r:13px;--rs:8px;
      --sh:0 1px 8px rgba(10,26,18,.07),0 4px 18px rgba(10,26,18,.06);
      --sh2:0 4px 16px rgba(10,26,18,.11),0 10px 32px rgba(10,26,18,.09);
    }
    body{
      min-height:100vh;background:var(--bg);
      background-image:radial-gradient(ellipse 60% 40% at 5% -5%,rgba(38,112,69,.09) 0%,transparent 55%),
        radial-gradient(ellipse 40% 30% at 95% 105%,rgba(37,94,140,.07) 0%,transparent 50%);
      color:var(--text);
      font:14px/1.6 -apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Segoe UI",sans-serif;
      padding:20px;
    }
    button,input,select{font:inherit;cursor:pointer;}

    .app{width:min(1340px,100%);margin:0 auto;display:flex;flex-direction:column;gap:14px;}

    /* ── Top bar ── */
    .topbar{
      display:flex;align-items:center;justify-content:space-between;gap:12px;
      background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
      padding:12px 18px;box-shadow:var(--sh);
    }
    .brand{display:flex;align-items:center;gap:11px;}
    .brand-ico{
      width:38px;height:38px;border-radius:10px;flex-shrink:0;
      background:linear-gradient(140deg,#267045,#38aa68);
      box-shadow:0 3px 10px rgba(38,112,69,.32);
      display:flex;align-items:center;justify-content:center;
    }
    .brand-ico svg{width:20px;height:20px;}
    .brand h1{font-size:1.13rem;font-weight:790;letter-spacing:-.02em;}
    .brand p{color:var(--sub);font-size:.75rem;margin-top:1px;}
    .nav-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
    .month-nav{
      display:inline-flex;align-items:center;gap:4px;
      background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:3px 7px;
    }
    .month-nav button{
      width:28px;height:28px;border:none;background:none;color:var(--sub);
      font-size:1rem;border-radius:50%;transition:background .13s,color .13s;
    }
    .month-nav button:hover{background:var(--surf2);color:var(--green3);}
    .month-label{min-width:94px;text-align:center;font-weight:730;font-size:.83rem;}
    .btn{
      display:inline-flex;align-items:center;gap:4px;
      border:1px solid var(--border);background:var(--panel);color:var(--sub);
      border-radius:var(--rs);padding:6px 11px;font-weight:660;font-size:.79rem;
      text-decoration:none;white-space:nowrap;
      transition:background .12s,border-color .12s,color .12s;
    }
    .btn:hover{background:var(--surf2);border-color:var(--border2);color:var(--text);}
    .btn.primary{
      background:linear-gradient(135deg,#267045,#38aa68);
      border-color:#267045;color:#fff;box-shadow:0 2px 8px rgba(38,112,69,.3);
    }
    .btn.primary:hover{background:linear-gradient(135deg,#1a5233,#267045);box-shadow:0 3px 12px rgba(38,112,69,.4);}
    .sbadge{
      display:inline-flex;align-items:center;gap:5px;
      font-size:.69rem;font-weight:660;padding:3px 9px;border-radius:999px;
    }
    .sbadge.srv{background:rgba(38,112,69,.1);color:var(--green3);border:1px solid rgba(38,112,69,.22);}
    .sbadge.loc{background:rgba(156,104,20,.1);color:var(--amber);border:1px solid rgba(156,104,20,.22);}
    .sdot{width:5px;height:5px;border-radius:50%;background:currentColor;}

    /* ── KPI row ── */
    .kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;}
    .kpi{
      background:var(--panel);border:1px solid var(--border);border-radius:var(--r);
      padding:15px 16px 13px;box-shadow:var(--sh);position:relative;overflow:hidden;
      transition:transform .18s,box-shadow .18s;
    }
    .kpi:hover{transform:translateY(-2px);box-shadow:var(--sh2);}
    .kpi::after{
      content:'';position:absolute;top:0;left:0;right:0;height:3px;
      border-radius:var(--r) var(--r) 0 0;
    }
    .kpi:nth-child(1)::after{background:linear-gradient(90deg,#267045,#58c47c);}
    .kpi:nth-child(2)::after{background:linear-gradient(90deg,#255e8c,#56a0d8);}
    .kpi:nth-child(3)::after{background:linear-gradient(90deg,#9c6814,#d8a83c);}
    .kpi:nth-child(4)::after{background:linear-gradient(90deg,#52489a,#908ed8);}
    .kpi-ico{position:absolute;top:13px;right:13px;width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:.95rem;}
    .kpi:nth-child(1) .kpi-ico{background:rgba(38,112,69,.1);}
    .kpi:nth-child(2) .kpi-ico{background:rgba(37,94,140,.1);}
    .kpi:nth-child(3) .kpi-ico{background:rgba(156,104,20,.1);}
    .kpi:nth-child(4) .kpi-ico{background:rgba(82,72,154,.1);}
    .kpi-lbl{color:var(--sub);font-size:.7rem;font-weight:650;letter-spacing:.03em;text-transform:uppercase;margin-bottom:5px;}
    .kpi-val{font-size:clamp(1.05rem,1.7vw,1.5rem);font-weight:840;letter-spacing:-.02em;line-height:1.1;}
    .kpi-sub{color:var(--muted);font-size:.7rem;margin-top:5px;}
    .kpi-bar{height:4px;border-radius:999px;background:var(--border);margin-top:8px;overflow:hidden;}
    .kpi-bar i{display:block;height:100%;border-radius:999px;background:var(--amber);transition:width .45s;}
    .pos{color:var(--green);}.neg{color:var(--red2);}.neu{color:var(--text);}
    .blu{color:var(--blue);}.amb{color:var(--amber);}.vio{color:var(--violet);}

    /* ── 3-col main grid ── */
    .main-grid{
      display:grid;
      grid-template-columns:300px 1fr 270px;
      gap:14px;
      align-items:stretch;  /* all panels same height */
    }

    /* ── Panel base ── */
    .panel{
      background:var(--panel);border:1px solid var(--border);
      border-radius:var(--r);box-shadow:var(--sh);padding:18px;
      min-width:0;display:flex;flex-direction:column;
    }
    .ph{display:flex;align-items:center;justify-content:space-between;gap:8px;margin-bottom:14px;flex-shrink:0;}
    .ph h2{font-size:.88rem;font-weight:760;}
    .ph small{
      color:var(--muted);font-size:.68rem;
      background:var(--surf);border:1px solid var(--border);border-radius:999px;padding:2px 7px;white-space:nowrap;
    }

    /* ── Entry form panel ── */
    .type-sw{display:grid;grid-template-columns:1fr 1fr;gap:7px;margin-bottom:12px;flex-shrink:0;}
    .type-sw button{
      border:1.5px solid var(--border);background:var(--surf);color:var(--sub);
      border-radius:var(--rs);padding:8px;font-weight:720;font-size:.83rem;transition:all .13s;
    }
    .type-sw button.active[data-type="expense"]{background:#fff1f1;border-color:#dfaaaa;color:var(--red2);box-shadow:0 1px 5px rgba(190,68,68,.12);}
    .type-sw button.active[data-type="income"]{background:#ecf7f0;border-color:#8ec8a6;color:var(--green3);box-shadow:0 1px 5px rgba(38,112,69,.12);}
    .fg{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
    .fg .full{grid-column:1/-1;}
    .field label{display:block;color:var(--sub);font-size:.68rem;font-weight:650;letter-spacing:.03em;text-transform:uppercase;margin-bottom:4px;}
    input,select{
      width:100%;border:1.5px solid var(--border);border-radius:var(--rs);
      background:var(--surf);color:var(--text);outline:none;padding:8px 10px;
      transition:border-color .13s,box-shadow .13s,background .13s;
    }
    input:focus,select:focus{border-color:var(--green);background:#fff;box-shadow:0 0 0 3px rgba(38,112,69,.1);}
    .form-actions{display:flex;gap:7px;margin-top:11px;flex-shrink:0;}
    .divider{height:1px;background:var(--border);margin:14px 0;flex-shrink:0;}
    .budget-row{display:flex;align-items:center;gap:8px;}
    .budget-row label{color:var(--sub);font-size:.7rem;font-weight:650;white-space:nowrap;letter-spacing:.03em;text-transform:uppercase;}
    .budget-row input{flex:1;padding:7px 9px;font-size:.82rem;}
    .budget-row .btn{flex-shrink:0;padding:6px 10px;font-size:.76rem;}
    .btn.ghost{background:transparent;border-color:var(--border);color:var(--muted);padding:6px 8px;font-size:.75rem;}
    .btn.ghost:hover{color:var(--red2);border-color:#dbb0b0;background:#fff1f1;}
    .hint-sm{color:var(--muted);font-size:.68rem;margin-top:auto;padding-top:12px;}

    /* ── Records panel ── */
    .filters{display:grid;grid-template-columns:120px 1fr;gap:8px;margin-bottom:12px;flex-shrink:0;}
    .record-list{overflow-y:auto;flex:1;padding-right:1px;}
    .rec{
      display:grid;grid-template-columns:10px minmax(0,1fr) auto;
      gap:10px;align-items:center;
      padding:9px 4px;border-bottom:1px solid var(--border);
      transition:background .11s;
    }
    .rec:last-child{border-bottom:none;}
    .rec:hover{background:var(--surf);border-radius:var(--rs);margin:0 -4px;padding:9px 8px;}
    .rec-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
    .rec-main{min-width:0;}
    .rec-top{display:flex;align-items:center;gap:6px;font-size:.84rem;font-weight:700;}
    .rec-top .note{color:var(--sub);font-weight:400;font-size:.77rem;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
    .rec-meta{color:var(--muted);font-size:.69rem;margin-top:1px;}
    .cat-tag{
      display:inline-flex;align-items:center;
      background:var(--surf2);border:1px solid var(--border);
      border-radius:999px;padding:0 7px;font-size:.68rem;font-weight:660;color:var(--sub);white-space:nowrap;
    }
    .rec-right{display:flex;flex-direction:column;align-items:flex-end;gap:2px;}
    .rec-amt{font-weight:820;font-size:.87rem;white-space:nowrap;}
    .rec-btns{display:flex;gap:1px;}
    .txt-btn{border:none;background:transparent;color:var(--muted);font-size:.69rem;font-weight:680;padding:3px 5px;border-radius:5px;transition:all .11s;cursor:pointer;}
    .txt-btn:hover{color:var(--green3);background:var(--surf2);}
    .txt-btn.d:hover{color:var(--red2);background:#fff1f1;}
    .empty-msg{color:var(--muted);text-align:center;padding:24px 12px;font-size:.8rem;border:1.5px dashed var(--border);border-radius:var(--rs);background:var(--surf);}

    /* ── Chart panel ── */
    .chart-area{flex:1;position:relative;min-height:180px;display:flex;flex-direction:column;justify-content:center;}
    canvas{width:100%!important;}
    .chart-empty{
      display:none;flex-direction:column;align-items:center;justify-content:center;
      gap:8px;flex:1;color:var(--muted);text-align:center;font-size:.79rem;
      border:1.5px dashed var(--border);border-radius:var(--rs);background:var(--surf);padding:16px;min-height:160px;
    }
    .chart-empty-ico{font-size:1.7rem;opacity:.3;}

    /* ── Bottom 2-col grid ── */
    .bottom-grid{display:grid;grid-template-columns:1.6fr 1fr;gap:14px;align-items:stretch;}

    /* ── Stats panel ── */
    .stat-cards{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px;flex-shrink:0;}
    .stat-card{text-align:center;padding:10px 6px;background:var(--surf);border-radius:var(--rs);border:1px solid var(--border);}
    .stat-card .sc-lbl{font-size:.68rem;color:var(--sub);margin-bottom:2px;}
    .stat-card .sc-val{font-weight:820;font-size:.92rem;}
    .cat-bars{flex:1;overflow-y:auto;}
    .cat-bar-item{margin-bottom:8px;}
    .cat-bar-hd{display:flex;justify-content:space-between;font-size:.78rem;margin-bottom:3px;}
    .cat-bar-hd span:first-child{font-weight:680;}
    .cat-bar-hd span:last-child{color:var(--sub);}
    .bar-track{height:5px;border-radius:999px;background:var(--border);overflow:hidden;}
    .bar-fill{height:100%;border-radius:999px;background:var(--red);opacity:.75;transition:width .4s;}

    ::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-thumb{background:#bfd0c5;border-radius:999px;}
    .hidden-file{display:none;}

    /* ── Responsive ── */
    @media(max-width:1060px){
      .main-grid{grid-template-columns:1fr 1fr;}
      .main-grid .chart-panel{grid-column:1/-1;flex-direction:row;gap:14px;}
      .main-grid .chart-panel .chart-area{flex:none;width:240px;}
      .bottom-grid{grid-template-columns:1fr;}
      .kpi-row{grid-template-columns:repeat(2,1fr);}
    }
    @media(max-width:680px){
      body{padding:12px;}
      .topbar{flex-direction:column;align-items:stretch;}
      .nav-row{flex-wrap:wrap;}
      .main-grid{grid-template-columns:1fr;}
      .kpi-row{grid-template-columns:1fr 1fr;}
      .fg,.filters{grid-template-columns:1fr;}
      .month-nav{width:100%;justify-content:space-between;}
      .month-label{flex:1;}
      .main-grid .chart-panel{flex-direction:column;}
      .main-grid .chart-panel .chart-area{width:auto;}
    }
  </style>
</head>
<body>
<main class="app">

  <!-- Header -->
  <header class="topbar">
    <div class="brand">
      <div class="brand-ico">
        <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.4" stroke-linecap="round">
          <path d="M4 7h16M4 12h16M4 17h10"/>
        </svg>
      </div>
      <div>
        <h1>记账本</h1>
        <p>收支 · 预算 · 趋势</p>
      </div>
    </div>
    <div class="nav-row">
      <span id="storageBadge" class="sbadge loc"><span class="sdot"></span>localStorage</span>
      <div class="month-nav">
        <button id="prevMonth">‹</button>
        <span class="month-label" id="monthLabel"></span>
        <button id="nextMonth">›</button>
      </div>
      <button class="btn" id="exportBtn">↓ 导出</button>
      <button class="btn" id="importBtn">↑ 导入</button>
      <input class="hidden-file" id="importFile" type="file" accept=".json,application/json"/>
    </div>
  </header>

  <!-- KPI 4-card row -->
  <section class="kpi-row">
    <article class="kpi">
      <div class="kpi-ico">💰</div>
      <div class="kpi-lbl">本月盈余</div>
      <div class="kpi-val neu" id="kpiSurplus">¥0.00</div>
      <div class="kpi-sub" id="kpiIO">收入 — · 支出 —</div>
    </article>
    <article class="kpi">
      <div class="kpi-ico">📊</div>
      <div class="kpi-lbl">储蓄率</div>
      <div class="kpi-val blu" id="kpiRate">—</div>
      <div class="kpi-sub" id="kpiRateSub">建议保持在 20% 以上</div>
    </article>
    <article class="kpi">
      <div class="kpi-ico">🎯</div>
      <div class="kpi-lbl">预算余额</div>
      <div class="kpi-val amb" id="kpiBudget">未设置</div>
      <div class="kpi-sub" id="kpiBudgetSub">在左侧设置月预算</div>
      <div class="kpi-bar" id="budgetBarWrap" style="display:none"><i id="budgetBar" style="width:0%"></i></div>
    </article>
    <article class="kpi">
      <div class="kpi-ico">🧾</div>
      <div class="kpi-lbl">本月笔数</div>
      <div class="kpi-val vio" id="kpiCount">0 笔</div>
      <div class="kpi-sub" id="kpiCountSub">支出 0 · 收入 0</div>
    </article>
  </section>

  <!-- 3-col main grid -->
  <div class="main-grid">

    <!-- Col 1: Entry form -->
    <div class="panel">
      <div class="ph">
        <h2 id="formTitle">快速记账</h2>
        <small id="formState">新增</small>
      </div>
      <div class="type-sw">
        <button type="button" class="active" data-type="expense">支出</button>
        <button type="button" data-type="income">收入</button>
      </div>
      <form id="entryForm">
        <div class="fg">
          <div class="field">
            <label for="eDate">日期</label>
            <input id="eDate" type="date" required/>
          </div>
          <div class="field">
            <label for="eCat">类别</label>
            <select id="eCat" required></select>
          </div>
          <div class="field full">
            <label for="eAmt">金额</label>
            <input id="eAmt" type="number" min="0.01" step="0.01" placeholder="0.00" required/>
          </div>
          <div class="field full">
            <label for="eNote">备注（选填）</label>
            <input id="eNote" type="text" maxlength="60" placeholder="例如：午餐、房租、工资"/>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn primary" id="eSubmit" type="submit">添加记录</button>
          <button class="btn" id="eCancel" type="button" style="display:none">取消</button>
        </div>
      </form>

      <div class="divider"></div>

      <!-- Budget inside form panel -->
      <div class="ph" style="margin-bottom:10px;">
        <h2>月预算</h2>
        <small id="budgetSummary">未设置</small>
      </div>
      <div class="budget-row">
        <label for="budgetInput">金额</label>
        <input id="budgetInput" type="number" min="0" step="1" placeholder="例如 8000"/>
        <button class="btn primary" id="saveBudget">保存</button>
        <button class="btn ghost" id="clearBudget" title="清空">✕</button>
      </div>

      <p class="hint-sm" id="storageHint">💾 数据保存在浏览器本地，建议定期导出备份</p>
    </div>

    <!-- Col 2: Records -->
    <div class="panel">
      <div class="ph">
        <h2>流水明细</h2>
        <small id="recCount">0 条</small>
      </div>
      <div class="filters">
        <select id="typeFilter">
          <option value="all">全部</option>
          <option value="expense">支出</option>
          <option value="income">收入</option>
        </select>
        <input id="searchBox" type="search" placeholder="搜索类别 / 备注 / 日期"/>
      </div>
      <div class="record-list" id="records"></div>
    </div>

    <!-- Col 3: Expense donut -->
    <div class="panel chart-panel">
      <div class="ph">
        <h2>支出构成</h2>
        <small id="expMeta">本月</small>
      </div>
      <div class="chart-area">
        <canvas id="expChart" style="max-height:230px"></canvas>
        <div class="chart-empty" id="expEmpty">
          <div class="chart-empty-ico">🥧</div>
          <div>本月暂无支出</div>
        </div>
      </div>
    </div>

  </div><!-- /main-grid -->

  <!-- Bottom 2-col grid -->
  <div class="bottom-grid">

    <!-- Trend chart -->
    <div class="panel">
      <div class="ph">
        <h2>12 个月储蓄趋势</h2>
        <small>累计盈余</small>
      </div>
      <div class="chart-area" style="min-height:160px">
        <canvas id="trendChart" style="max-height:185px"></canvas>
        <div class="chart-empty" id="trendEmpty">
          <div class="chart-empty-ico">📈</div>
          <div>记录几个月后显示</div>
        </div>
      </div>
    </div>

    <!-- Stats panel -->
    <div class="panel">
      <div class="ph">
        <h2>本月分类</h2>
        <small id="statsDate"></small>
      </div>
      <div class="stat-cards" id="statCards"></div>
      <div class="cat-bars" id="catBars"></div>
    </div>

  </div><!-- /bottom-grid -->

</main>

<script>
/* ══════════════════════════════════════════
   Constants
══════════════════════════════════════════ */
const SK='ftApp_v1', LEGACY=['financeApp_v5','financeApp_v4'];
const INC_CATS=['工资','兼职','投资收益','红包','其他收入'];
const EXP_CATS=['餐饮','购物','交通','娱乐','住房','医疗','教育','其他'];
const ECOL=['#be4444','#d87040','#c89020','#68a030','#267045','#255e8c','#52489a','#a03878'];

/* Demo data — injected if storage is empty */
const DEMO={
  incCats:[...INC_CATS],expCats:[...EXP_CATS],
  budgets:{'2026-05':{monthly:9000},'2026-06':{monthly:9000}},
  months:{
    '2026-03':{

/* ══════════════════════════════════════════
   Storage / Server
══════════════════════════════════════════ */
const IS_LOCAL=location.hostname==='localhost'||location.hostname==='127.0.0.1';
const API=IS_LOCAL?`http://${location.hostname}:3457/api/finance`:null;
let srvOK=false,saveTimer=null;
async function ping(){try{return(await fetch(API+'/ping',{signal:AbortSignal.timeout(800)})).ok}catch{return false}}
async function loadSrv(){const r=await fetch(API+'/data');if(!r.ok)throw 0;return r.json();}
async function pushSrv(d){await fetch(API+'/data',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(d)});}

/* ══════════════════════════════════════════
   State helpers
══════════════════════════════════════════ */
const now=new Date();
let CY=now.getFullYear(),CM=now.getMonth()+1;
let st,etype='expense',editing=null,echart=null,tchart=null;

function emptyState(){return{incCats:[...INC_CATS],expCats:[...EXP_CATS],months:{},budgets:{}};}
function norm(input){
  const n={
    incCats:Array.isArray(input.incCats)&&input.incCats.length?input.incCats:[...INC_CATS],
    expCats:Array.isArray(input.expCats)&&input.expCats.length?input.expCats:[...EXP_CATS],
    months:{},budgets:{}
  };
  Object.entries(input.months||{}).forEach(([k,m])=>{
    n.months[k]={
      income:(m.income||[]).map(x=>normE(x,'income',k)).filter(Boolean),
      expense:(m.expense||[]).map(x=>normE(x,'expense',k)).filter(Boolean),
    };
  });
  Object.keys(input.budgets||{}).forEach(k=>{
    const bk=input.budgets[k]||{};
    const v=+(bk.monthly??bk)??0;
    n.budgets[k]={monthly:v>0?v:0};
  });
  return n;
}
function normE(x,type,mk){
  const a=+x.amount;if(!isFinite(a)||a<=0)return null;
  return{id:sid(x.id),cat:String(x.cat||(type==='income'?INC_CATS[0]:EXP_CATS[0])),
    amount:a,note:String(x.note||'').slice(0,60),
    date:/^\d{4}-\d{2}-\d{2}$/.test(x.date+'')?x.date:mk+'-01'};
}
function loadLS(){
  const raw=localStorage.getItem(SK)||LEGACY.map(k=>localStorage.getItem(k)).find(Boolean);
  if(!raw)return null;
  try{const p=JSON.parse(raw);return norm(p.data||p);}catch{return null;}
}
function save(){
  localStorage.setItem(SK,JSON.stringify(st));
  if(srvOK){clearTimeout(saveTimer);saveTimer=setTimeout(()=>pushSrv(st).catch(()=>{}),400);}
}
const $=id=>document.getElementById(id);
function uid(){return Math.random().toString(36).slice(2)+Date.now().toString(36);}
function sid(v){const s=String(v||'');return/^[a-z0-9]+$/i.test(s)?s:uid();}
function mk(y=CY,m=CM){return`${y}-${String(m).padStart(2,'0')}`;}
function today(){const d=new Date();return`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;}
function cMonth(){const k=mk();if(!st.months[k])st.months[k]={income:[],expense:[]};return st.months[k];}
function cBudget(){const k=mk();if(!st.budgets[k])st.budgets[k]={monthly:0};return st.budgets[k];}
function fmt(v,c=false){return(+v||0).toLocaleString('zh-CN',{style:'currency',currency:'CNY',minimumFractionDigits:c?0:2,maximumFractionDigits:c?0:2});}
function esc(v){return String(v||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function sum(a){return a.reduce((t,x)=>t+(+x.amount||0),0);}
function byCat(a){return a.reduce((m,x)=>{m[x.cat]=(m[x.cat]||0)+(+x.amount||0);return m;},{});}

/* ══════════════════════════════════════════
   Render functions
══════════════════════════════════════════ */
function updateBadge(){
  const b=$('storageBadge'),h=$('storageHint');
  if(srvOK){b.className='sbadge srv';b.innerHTML='<span class="sdot"></span>本地服务器';
    h.textContent='✅ 数据已写入本地文件，重启浏览器不会丢失';}
  else{b.className='sbadge loc';b.innerHTML='<span class="sdot"></span>localStorage';
    h.textContent='💾 数据保存在浏览器本地，建议定期导出备份';}
}

function renderKPI(){
  const d=cMonth(),inc=sum(d.income),exp=sum(d.expense),sur=inc-exp;
  const sr=inc>0?(sur/inc)*100:0,bud=cBudget();
  $('kpiSurplus').textContent=fmt(sur);
  $('kpiSurplus').className='kpi-val '+(sur>0?'pos':sur<0?'neg':'neu');
  $('kpiIO').textContent=`收入 ${fmt(inc,true)} · 支出 ${fmt(exp,true)}`;
  $('kpiRate').textContent=inc>0?`${sr.toFixed(1)}%`:'—';
  $('kpiRate').className='kpi-val '+(sr>=20?'pos':sr>0?'blu':'neu');
  $('kpiRateSub').textContent=inc>0?(sr>=20?'✓ 健康储蓄，继续保持':'建议压缩非必要支出'):'本月暂无收入记录';
  if(bud.monthly>0){
    const rem=bud.monthly-exp,pct=Math.min(100,exp/bud.monthly*100);
    $('kpiBudget').textContent=fmt(rem);
    $('kpiBudget').className='kpi-val '+(rem>=0?'pos':'neg');
    $('kpiBudgetSub').textContent=`已用 ${pct.toFixed(0)}%，共 ${fmt(bud.monthly,true)}`;
    $('budgetBarWrap').style.display='block';
    $('budgetBar').style.width=pct+'%';
    $('budgetBar').style.background=pct>=100?'var(--red)':pct>=80?'var(--amber)':'var(--green)';
  }else{
    $('kpiBudget').textContent='未设置';$('kpiBudget').className='kpi-val amb';
    $('kpiBudgetSub').textContent='在左侧设置月预算金额';$('budgetBarWrap').style.display='none';
  }
  const total=d.income.length+d.expense.length;
  $('kpiCount').textContent=total?`${total} 笔`:'0 笔';
  $('kpiCountSub').textContent=`支出 ${d.expense.length} · 收入 ${d.income.length}`;
  $('budgetInput').value=bud.monthly||'';
  $('budgetSummary').textContent=bud.monthly?`${fmt(bud.monthly,true)}/月`:'未设置';
}

function renderRecords(){
  const d=cMonth(),fl=$('typeFilter').value,kw=$('searchBox').value.trim().toLowerCase();
  let rows=[...d.expense.map(x=>({...x,type:'expense'})),...d.income.map(x=>({...x,type:'income'}))];
  if(fl!=='all')rows=rows.filter(x=>x.type===fl);
  if(kw)rows=rows.filter(x=>[x.date,x.cat,x.note,String(x.amount)].join(' ').toLowerCase().includes(kw));
  rows.sort((a,b)=>b.date.localeCompare(a.date)||b.id.localeCompare(a.id));
  $('recCount').textContent=rows.length+' 条';
  if(!rows.length){$('records').innerHTML='<div class="empty-msg">没有匹配的记录</div>';return;}
  $('records').innerHTML=rows.map(x=>{
    const ie=x.type==='expense',col=ie?'#be4444':'#267045',amt=(ie?'-':'+')+fmt(x.amount);
    return`<div class="rec">
      <span class="rec-dot" style="background:${col}"></span>
      <div class="rec-main">
        <div class="rec-top"><span class="cat-tag">${esc(x.cat)}</span>${x.note?`<span class="note">${esc(x.note)}</span>`:''}</div>
        <div class="rec-meta">${esc(x.date)} · ${ie?'支出':'收入'}</div>
      </div>
      <div class="rec-right">
        <span class="rec-amt ${ie?'neg':'pos'}">${amt}</span>
        <div class="rec-btns">
          <button class="txt-btn" onclick="startEdit('${x.type}','${x.id}')">编辑</button>
          <button class="txt-btn d" onclick="delEntry('${x.type}','${x.id}')">删</button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function renderStats(){
  const d=cMonth(),inc=sum(d.income),exp=sum(d.expense),total=d.income.length+d.expense.length;
  $('statsDate').textContent=`${CY}年${CM}月`;
  $('statCards').innerHTML=`
    <div class="stat-card"><div class="sc-lbl">总收入</div><div class="sc-val pos">${fmt(inc,true)}</div></div>
    <div class="stat-card"><div class="sc-lbl">总支出</div><div class="sc-val neg">${fmt(exp,true)}</div></div>
    <div class="stat-card"><div class="sc-lbl">笔数</div><div class="sc-val vio">${total}</div></div>`;
  const cs=Object.entries(byCat(d.expense)).sort((a,b)=>b[1]-a[1]);
  if(!cs.length){$('catBars').innerHTML='<div class="empty-msg">本月暂无支出分类</div>';return;}
  $('catBars').innerHTML=cs.map(([cat,amt])=>{
    const pct=exp>0?amt/exp*100:0;
    return`<div class="cat-bar-item">
      <div class="cat-bar-hd"><span>${esc(cat)}</span><span>${fmt(amt,true)} · ${pct.toFixed(0)}%</span></div>
      <div class="bar-track"><div class="bar-fill" style="width:${pct}%"></div></div>
    </div>`;
  }).join('');
}

function drawExpense(){
  const d=cMonth(),g=Object.entries(byCat(d.expense)).sort((a,b)=>b[1]-a[1]);
  const cv=$('expChart'),em=$('expEmpty');
  if(echart){echart.destroy();echart=null;}
  if(!g.length||typeof Chart==='undefined'){cv.style.display='none';em.style.display='flex';return;}
  cv.style.display='block';em.style.display='none';
  echart=new Chart(cv.getContext('2d'),{type:'doughnut',data:{
    labels:g.map(([c])=>c),
    datasets:[{data:g.map(([,a])=>a),backgroundColor:g.map((_,i)=>ECOL[i%ECOL.length]),borderColor:'#fff',borderWidth:2.5,hoverOffset:7}]
  },options:{cutout:'66%',plugins:{
    legend:{position:'bottom',labels:{boxWidth:8,boxHeight:8,color:'#4c5f56',font:{size:10.5},padding:9}},
    tooltip:{callbacks:{label:ctx=>` ${ctx.label}: ${fmt(ctx.parsed)}`}},
  },animation:{duration:350,easing:'easeOutCubic'}}});
}

function drawTrend(){
  const months=[],labels=[];
  for(let i=11;i>=0;i--){
    let y=CY,m=CM-i;while(m<1){m+=12;y--;}while(m>12){m-=12;y++;}
    months.push(mk(y,m));labels.push(`${y}/${String(m).padStart(2,'0')}`);
  }
  let run=0;
  Object.keys(st.months).sort().forEach(k=>{if(k<months[0]){const m=st.months[k];run+=sum(m.income||[])-sum(m.expense||[]);}});
  const vals=months.map(k=>{const m=st.months[k];if(m)run+=sum(m.income||[])-sum(m.expense||[]);return+run.toFixed(2);});
  const hasData=vals.some(v=>v!==0);
  const cv=$('trendChart'),em=$('trendEmpty');
  if(tchart){tchart.destroy();tchart=null;}
  if(!hasData||typeof Chart==='undefined'){cv.style.display='none';em.style.display='flex';return;}
  cv.style.display='block';em.style.display='none';
  const ctx=cv.getContext('2d'),g=ctx.createLinearGradient(0,0,0,160);
  g.addColorStop(0,'rgba(38,112,69,.2)');g.addColorStop(1,'rgba(38,112,69,.01)');
  tchart=new Chart(cv,{type:'line',data:{labels,datasets:[{
    data:vals,borderColor:'#267045',backgroundColor:g,borderWidth:2,
    pointRadius:3.5,pointHoverRadius:5.5,pointBackgroundColor:'#267045',
    pointBorderColor:'#fff',pointBorderWidth:1.5,tension:.38,fill:true,
  }]},options:{plugins:{legend:{display:false},tooltip:{callbacks:{label:c=>` ${fmt(c.parsed.y)}`}}},
    scales:{
      x:{ticks:{color:'#86998f',font:{size:10.5}},grid:{color:'#dce9df'}},
      y:{ticks:{color:'#86998f',font:{size:10.5},callback:v=>fmt(v,true)},grid:{color:'#dce9df'}},
    },animation:{duration:350,easing:'easeOutCubic'}}});
}

/* ══════════════════════════════════════════
   Form & Actions
══════════════════════════════════════════ */
function renderCats(){
  const cats=etype==='income'?st.incCats:st.expCats;
  $('eCat').innerHTML=cats.map(c=>`<option value="${esc(c)}">${esc(c)}</option>`).join('');
}
function setType(t){
  etype=t;
  document.querySelectorAll('.type-sw button').forEach(b=>b.classList.toggle('active',b.dataset.type===t));
  renderCats();
}
function setDate(){
  const last=new Date(CY,CM,0).getDate(),b=mk();
  $('eDate').min=b+'-01';$('eDate').max=b+'-'+String(last).padStart(2,'0');
  if(!editing){const t=today();$('eDate').value=t.startsWith(b)?t:b+'-01';}
}
function startEdit(type,id){
  const item=cMonth()[type].find(x=>x.id===id);if(!item)return;
  editing={type,id};setType(type);
  $('eDate').value=item.date;$('eCat').value=item.cat;$('eAmt').value=item.amount;$('eNote').value=item.note||'';
  $('eSubmit').textContent='保存修改';$('eCancel').style.display='inline-flex';$('formState').textContent='编辑中';
  $('formTitle').scrollIntoView({behavior:'smooth',block:'center'});
}
function resetForm(){
  editing=null;$('entryForm').reset();setDate();setType(etype);
  $('eSubmit').textContent='添加记录';$('eCancel').style.display='none';$('formState').textContent='新增';
}
function delEntry(type,id){
  if(!confirm('确认删除这条流水吗？'))return;
  const d=cMonth();d[type]=d[type].filter(x=>x.id!==id);
  save();if(editing&&editing.id===id)resetForm();renderAll();
}
function saveEntry(e){
  e.preventDefault();
  const date=$('eDate').value,cat=$('eCat').value,amt=+$('eAmt').value,note=$('eNote').value.trim();
  if(!/^\d{4}-\d{2}-\d{2}$/.test(date)||!cat||!isFinite(amt)||amt<=0){alert('请填写有效的日期、类别和金额');return;}
  const k=date.slice(0,7),[y,m]=k.split('-').map(Number);
  if(!st.months[k])st.months[k]={income:[],expense:[]};
  if(editing){
    const ol=cMonth()[editing.type],oi=ol.findIndex(x=>x.id===editing.id);
    if(oi>=0)ol.splice(oi,1);
    st.months[k][etype].push({id:editing.id,cat,amount:amt,note,date});
  }else st.months[k][etype].push({id:uid(),cat,amount:amt,note,date});
  CY=y;CM=m;save();resetForm();renderAll();
}
function exportData(){
  const blob=new Blob([JSON.stringify({version:1,exportedAt:new Date().toISOString(),data:st},null,2)],{type:'application/json'});
  const a=Object.assign(document.createElement('a'),{href:URL.createObjectURL(blob),download:`finance-${mk()}-backup.json`});
  document.body.appendChild(a);a.click();a.remove();URL.revokeObjectURL(a.href);
}
function importData(file){
  if(!file)return;
  const r=new FileReader();
  r.onload=()=>{
    try{const p=JSON.parse(r.result);if(!confirm('导入会覆盖当前所有数据，确认吗？'))return;
      st=norm(p.data||p);save();resetForm();renderAll();alert('导入完成');}
    catch{alert('文件格式不正确');}
    finally{$('importFile').value='';}
  };r.readAsText(file);
}
function changeMonth(d){CM+=d;while(CM<1){CM+=12;CY--;}while(CM>12){CM-=12;CY++;}resetForm();renderAll();}
function renderAll(){
  $('monthLabel').textContent=`${CY}年${CM}月`;
  setDate();renderCats();renderKPI();renderRecords();renderStats();drawExpense();drawTrend();
}

/* ── Events ── */
document.querySelectorAll('.type-sw button').forEach(b=>b.addEventListener('click',()=>setType(b.dataset.type)));
$('entryForm').addEventListener('submit',saveEntry);
$('eCancel').addEventListener('click',resetForm);
$('prevMonth').addEventListener('click',()=>changeMonth(-1));
$('nextMonth').addEventListener('click',()=>changeMonth(1));
$('exportBtn').addEventListener('click',exportData);
$('importBtn').addEventListener('click',()=>$('importFile').click());
$('importFile').addEventListener('change',e=>importData(e.target.files[0]));
$('saveBudget').addEventListener('click',()=>{const v=+$('budgetInput').value;cBudget().monthly=v>0?v:0;save();renderAll();});
$('clearBudget').addEventListener('click',()=>{if(!confirm('清空本月预算？'))return;st.budgets[mk()]={monthly:0};save();renderAll();});
$('typeFilter').addEventListener('change',renderRecords);
$('searchBox').addEventListener('input',renderRecords);

/* ══════════════════════════════════════════
   Boot
══════════════════════════════════════════ */
(async()=>{
  if(IS_LOCAL){
    srvOK=await ping();
    if(srvOK){
      try{
        const d=await loadSrv();
        if(d&&(d.months||d.incCats)){st=norm(d);localStorage.setItem(SK,JSON.stringify(st));}
        else{
          // server empty — check LS, else seed demo
          const ls=loadLS();
          st=ls||(()=>{const s=norm(DEMO);return s;})();
          await pushSrv(st);
        }
      }catch{const ls=loadLS();st=ls||norm(DEMO);}
    }else{const ls=loadLS();st=ls||norm(DEMO);}
  }else{const ls=loadLS();st=ls||norm(DEMO);}
  updateBadge();setType('expense');renderAll();
})();
</script>
